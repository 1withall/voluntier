version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: voluntier-postgres
    environment:
      POSTGRES_DB: voluntier
      POSTGRES_USER: voluntier_user
      POSTGRES_PASSWORD: voluntier_password
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voluntier_user -d voluntier"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voluntier-network

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: voluntier-redis
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voluntier-network

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.14-community
    container_name: voluntier-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voluntier-network

  # Temporal Server
  temporal:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=voluntier_user
      - POSTGRES_PWD=voluntier_password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    image: temporalio/auto-setup:1.22.4
    container_name: voluntier-temporal
    ports:
      - 7233:7233
    volumes:
      - ./config/temporal:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "workflow", "list"]
      interval: 1s
      timeout: 5s
      retries: 30
    networks:
      - voluntier-network

  # Temporal Web UI
  temporal-web:
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_GRPC_ENDPOINT=temporal:7233
      - TEMPORAL_PERMIT_WRITE_API=true
    image: temporalio/web:2.21.3
    container_name: voluntier-temporal-web
    ports:
      - 8080:8080
    networks:
      - voluntier-network

  # vLLM Server for AI/LLM capabilities
  vllm:
    image: vllm/vllm-openai:latest
    container_name: voluntier-vllm
    command: ["--model", "microsoft/DialoGPT-medium", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=-1  # CPU only for development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voluntier-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voluntier-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://voluntier_user:voluntier_password@postgres:5432/voluntier
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - TEMPORAL_HOST=temporal:7233
      - VLLM_BASE_URL=http://vllm:8000
      - SECRET_KEY=your-super-secret-key-change-in-production
      - ENVIRONMENT=development
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - voluntier-network

  # Temporal Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: voluntier-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://voluntier_user:voluntier_password@postgres:5432/voluntier
      - REDIS_URL=redis://:redis_password@redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - TEMPORAL_HOST=temporal:7233
      - VLLM_BASE_URL=http://vllm:8000
      - SECRET_KEY=your-super-secret-key-change-in-production
      - ENVIRONMENT=development
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - voluntier-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: voluntier-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - voluntier-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: voluntier-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - voluntier-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  vllm_cache:
  prometheus_data:
  grafana_data:

networks:
  voluntier-network:
    driver: bridge